<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photon International School</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#F7F4EE;
    }

    .hero{
      height:100vh;
      background:url('school.jpg') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
    }

    .overlay{
      background:rgba(0,0,0,0.4);
      padding:40px;
      border-radius:20px;
    }

    h1{
      font-size:60px;
      margin:0;
    }

    p{
      font-size:22px;
    }

    .btn{
      display:inline-block;
      padding:14px 30px;
      background:#7B1E2B;
      color:white;
      text-decoration:none;
      border-radius:10px;
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="overlay">
    <h1>Photon International School</h1>
    <p>Illuminating Minds. Empowering Futures.</p>
    <a href="#" class="btn">Admissions Open</a>
  </div>
</section>

</body>
</html>
